version: "3.9"

services:
  app:
    build: .
    volumes:
      - ./app:/app
    container_name: marc21_app
    expose:
      - "5000"
    restart: always

  nginx:
    image: nginx:latest
    container_name: marc21_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always
