version: "3.9"

services:
  app:
    build: .
    container_name: marc21_app
    expose:
      - "5000"
    restart: always
    volumes:
      - ./app:/app  # optional for live code updates in dev

  nginx:
    image: nginx:latest
    container_name: marc21_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app
    restart: always
    
